spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}

  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful
  forward-headers-strategy: framework

app:
  workspace:
    invitation-ttl: ${WORKSPACE_INVITATION_TTL:7d}

  security:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      max-entries: ${RATE_LIMIT_MAX_ENTRIES:10000}
      idle-ttl: ${RATE_LIMIT_IDLE_TTL:1h}
    refresh-cookie:
      secure: ${REFRESH_COOKIE_SECURE:true}
    jwt:
      secret: ${JWT_SECRET}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
  ai:
    enabled: ${AI_ENABLED:false}
    suggestion-ttl: ${AI_SUGGESTION_TTL:7d}
    request-timeout: ${AI_REQUEST_TIMEOUT:30s}
    max-breakdown-items: ${AI_MAX_BREAKDOWN_ITEMS:8}
    include-comments-limit: ${AI_INCLUDE_COMMENTS_LIMIT:20}
    include-activity-limit: ${AI_INCLUDE_ACTIVITY_LIMIT:20}
    max-context-issues: ${AI_MAX_CONTEXT_ISSUES:100}
    rate-limit:
      enabled: ${AI_RATE_LIMIT_ENABLED:true}
      capacity: ${AI_RATE_LIMIT_CAPACITY:10}
      window: ${AI_RATE_LIMIT_WINDOW:1m}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  structured:
    format:
      console: logstash
