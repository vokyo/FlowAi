spring:
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flowai}
    username: ${SPRING_DATASOURCE_USERNAME:flowai}
    password: ${SPRING_DATASOURCE_PASSWORD:flowai_dev_password}
app:
  workspace:
    invitation-ttl: 7d
  security:
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      max-entries: ${RATE_LIMIT_MAX_ENTRIES:10000}
      idle-ttl: ${RATE_LIMIT_IDLE_TTL:1h}
    refresh-cookie:
      secure: ${REFRESH_COOKIE_SECURE:false}
    jwt:
      secret: ${JWT_SECRET:dev-secret-must-be-long-enough-for-hmac-sha256}
      access-token-ttl: 15m
      refresh-token-ttl: 7d






management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
